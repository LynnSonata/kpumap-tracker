<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPU Surrey Distance Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        #map { height: 500px; width: 100%; max-width: 800px; margin: 20px auto; border-radius: 8px; border: 2px solid #ccc; }
        .info-box { background: #f4f4f4; padding: 15px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

    <h2>📍 KPU Surrey Library Distance Tracker</h2>
    
    <div class="info-box">
        <h3 id="distance-text">Calculating distance...</h3>
        <p id="status-text">Getting your location...</p>
    </div>

    <div id="map"></div>

    <script>
        const kpuLat = 49.1328;
        const kpuLng = -122.8714;

        const map = L.map('map').setView([kpuLat, kpuLng], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        L.marker([kpuLat, kpuLng]).addTo(map).bindPopup("<b>KPU Surrey Library</b>").openPopup();

        let userMarker = null;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return (R * c).toFixed(2); 
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                if (userMarker) {
                    userMarker.setLatLng([userLat, userLng]);
                } else {
                    userMarker = L.circleMarker([userLat, userLng], {color: 'red'}).addTo(map).bindPopup("You are here");
                }

                const distance = getDistance(userLat, userLng, kpuLat, kpuLng);
                document.getElementById('distance-text').innerText = `Distance to KPU Library: ${distance} km`;
                document.getElementById('status-text').innerText = "Location tracking active.";
                
            }, (error) => {
                document.getElementById('status-text').innerText = "Error getting location. Please allow location access.";
            });
        } else {
            document.getElementById('status-text').innerText = "Geolocation is not supported by your browser.";
        }
    </script>
</body>
</html>
